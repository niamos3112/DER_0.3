<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Innovación Cusco 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container" id="main-card">
        <header class="top-header">
            <a href="https://www.gob.pe/produce" class="logo-link fade-in" target="_blank">
                <img src="/imagenes/MP.PNG" alt="Ministerio de la Producción">
            </a>
            <h2 class="hub-title fade-in">HUB DE INNOVACIÓN CUSCO 2026</h2>
            <a href="https://www.proinnovate.gob.pe/" class="logo-link fade-in" target="_blank">
                <img src="/imagenes/innova.PNG" alt="Pro Innóvate">
            </a>
        </header>

        <div class="sub-header">
            <div class="left-logos fade-in delay-1">
                <a href="#" class="logo-link">
                    <img src="/imagenes/cc.png" alt="Logo Entidad">
                </a>
                <a href="#" class="logo-link">
                    <img src="/imagenes/innovades.PNG" alt="Innovandes Cusco">
                </a>
            </div>
            <h3 class="der-title fade-in delay-1">DER CUSCO 3.0</h3>
        </div>

        <main class="main-content">
            <h1 class="main-title fade-in delay-2">
                CONCURSOS REGIONALES<br>
                <span class="highlight-red">CUSCO</span>
            </h1>
            <p class="subtitle fade-in delay-3">Elija el concurso de su interés aquí:</p>

            <div class="button-container fade-in delay-4">
                <a href="/templates/innovacion-empresarial.html" class="action-btn red-btn">
                    <div class="icon-wrapper">
                        <i class="fa-regular fa-lightbulb"></i>
                    </div>
                    <span class="btn-text">Innovación Empresarial</span>
                </a>

                <a href="#emprendimientos-innovadores" class="action-btn black-btn">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-rocket"></i>
                    </div>
                    <span class="btn-text">Emprendimientos Innovadores</span>
                </a>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
